version: '3.9'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tipp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tipp-network

  neo4j:
    image: neo4j:5.15
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - 7474:7474
      - 7687:7687
    volumes:
      - neo4j_data:/data
    networks:
      - tipp-network

  redis:
    image: redis:7
    ports:
      - 6379:6379
    networks:
      - tipp-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - 5672:5672
      - 15672:15672
    networks:
      - tipp-network

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - 6333:6333
    networks:
      - tipp-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/tipp
      - SECRET_KEY=super-secret-change-me
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - neo4j
      - redis
      - rabbitmq
      - qdrant
    ports:
      - 8000:8000
    networks:
      - tipp-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - 3000:3000
    depends_on:
      - backend
    networks:
      - tipp-network

volumes:
  postgres_data:
  neo4j_data:

networks:
  tipp-network:
    driver: bridge
