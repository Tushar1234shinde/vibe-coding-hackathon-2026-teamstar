apiVersion: apps/v1
kind: Deployment
metadata:
  name: tipp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tipp-backend
  template:
    metadata:
      labels:
        app: tipp-backend
    spec:
      containers:
        - name: backend
          image: tipp-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg://postgres:postgres@postgres:5432/tipp"
            - name: SECRET_KEY
              value: "super-secret-change-me"
            - name: NEO4J_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              value: "password"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: tipp-backend
spec:
  ports:
    - port: 8000
  selector:
    app: tipp-backend
